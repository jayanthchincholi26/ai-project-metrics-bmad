[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-metrics-capture"
version = "0.7.0"
description = "Install the AI-accelerated engineering metrics capture tooling into a git repo with one command"
readme = "README.md"
requires-python = ">=3.9"
# No LICENSE file exists in this repo yet - `license` is intentionally omitted
# rather than asserting a license that hasn't actually been chosen. Must be
# resolved (add a LICENSE file + this field) before any real PyPI publish.

[project.scripts]
ai-metrics-capture = "ai_metrics_capture.cli:main"

[project.urls]
Homepage = "https://github.com/jayanthchincholi26/ai-project-metrics-bmad"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_metrics_capture"]

# Explicit, not VCS-tracked-file-based: src/ai_metrics_capture/_bundled/ is
# generated by sync_bundle.py (run before `uv build`) and is .gitignore'd,
# so it must be listed here regardless of git tracking status (hatchling's
# `packages` mode for the wheel target already walks this directory fully -
# no separate force-include needed, or entries get double-added).
[tool.hatch.build.targets.sdist]
include = [
    "src/ai_metrics_capture/**",
    "pyproject.toml",
    "README.md",
]
