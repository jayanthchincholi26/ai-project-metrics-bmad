name: ci

on:
  pull_request:
  push:
    branches: [develop, main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check tools tests
      - name: Tests
        run: uv run pytest -q
