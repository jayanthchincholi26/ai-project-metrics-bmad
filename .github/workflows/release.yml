name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Tests
        run: uv run pytest -q
      - name: Build artifact
        run: uv run tools/build-release/main.py --version "${GITHUB_REF_NAME}"
      - name: Create release and attach artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/ai-metrics-capture-${GITHUB_REF_NAME}.zip" \
            --title "AI Metrics Capture ${GITHUB_REF_NAME}" \
            --generate-notes
